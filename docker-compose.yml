# Docker Compose - Shared Infrastructure
#
# Runs SHARED services only: Ollama (LLM) and Speaches (TTS/STT).
# Each user runs their own compose file that connects via notebook_network.
#
# Usage:
#   1. Start shared services first:   docker compose up -d
#   2. Start user instances:          docker compose -f docker-compose.user1.yml up -d
#                                     docker compose -f docker-compose.user2.yml up -d
#
# Pull Ollama models after first start:
#   docker exec ollama ollama pull mistral
#   docker exec ollama ollama pull nomic-embed-text
#   docker exec ollama ollama pull mxbai-embed-large

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - notebook_network
    restart: always
    pull_policy: always
    # For GPU acceleration (NVIDIA), uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: speaches
    ports:
      - "8969:8000"
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    networks:
      - notebook_network
    restart: unless-stopped

networks:
  notebook_network:
    name: notebook_network

volumes:
  ollama_models:
  hf-hub-cache:

# ==========================================
# CONFIGURATION IN OPEN NOTEBOOK
# ==========================================
#
# 1. Configure Ollama:
#    - Go to Settings -> API Keys
#    - Add Credential -> Select "Ollama"
#    - Base URL: http://ollama:11434
#    - Save -> Test Connection -> Discover Models -> Register Models
#
# 2. Configure Speaches (TTS/STT):
#    - Go to Settings -> API Keys
#    - Add Credential -> Select "OpenAI-Compatible"
#    - Name: "Local Speaches"
#    - Base URL for TTS: http://speaches:8000/v1
#    - Save -> Test Connection -> Discover Models
#
# ==========================================
# RECOMMENDED MODELS
# ==========================================
#
# For LLM (choose based on your hardware):
# - Fast: mistral (7B), qwen2.5 (7B)
# - Balanced: llama3.1 (8B)
# - Best quality: qwen2.5 (14B+), llama3.1 (70B) - requires powerful GPU
#
# For Embeddings:
# - nomic-embed-text (recommended, 137M params)
# - mxbai-embed-large (334M params, better quality)
#
# For TTS:
# - speaches-ai/Kokoro-82M-v1.0-ONNX (good quality, fast)
#
# For STT (Whisper):
# - faster-whisper-small (balanced, ~500MB)
# - faster-whisper-large-v3 (best quality, slower, ~3GB)
